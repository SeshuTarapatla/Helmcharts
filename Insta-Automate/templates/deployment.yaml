apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.app }}
  template:
    metadata:
      labels:
        app: {{ .Values.app }}
    spec:
      initContainers:
        - name: {{ .Values.app }}-telegram-init
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          command: ["ia", "tl", "init"]
        - name: {{ .Values.app }}-db-init
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          command: ["ia", "db", "init"]
        - name: {{ .Values.app }}-flow-init
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          command: ["ia", "prefect", "deploy"]
      containers:
        - name: {{ .Values.app }}
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          command: ["ia", "prefect", "serve"]
          # - sh
          # - -c
